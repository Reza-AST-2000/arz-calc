<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ابزار‌ها | محاسبه‌گر مالی و ابزارهای کاربردی</title>
<meta name="description" content="محاسبه‌گر مالی، طلا، ارز، کریپتو و ابزارهای کاربردی روزمره — به صورت آفلاین و رایگان.">
<meta name="theme-color" content="#0c130f">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <!-- ===== Home ===== -->
  <header class="topbar" id="home-header">
    <button class="icon-btn" id="theme-toggle" title="تغییر تم" aria-label="تغییر تم">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 2a10 10 0 1 0 9.99 10.6A8 8 0 0 1 12 2Z"/></svg>
    </button>
    <div class="title-block">
      <h1>محاسبه‌گر مالی</h1>
      <p>ارز · طلا · کریپتو</p>
    </div>
    <div class="badge-icon">🧮</div>
  </header>

  <main id="view-home" class="view active">
    <section class="hero-card">
      <div class="hero-row">
        <div class="hero-actions">
          <button class="round-btn" id="hero-import" title="دریافت"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M5 20h14v-2H5v2Zm7-18-5.5 5.5 1.4 1.4L11 5.83V16h2V5.83l3.1 3.07 1.4-1.4L12 2Z" transform="rotate(180 12 12)"/></svg></button>
          <button class="round-btn" id="hero-copy" title="کپی"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1Zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm0 16H8V7h11v14Z"/></svg></button>
        </div>
        <div class="hero-display">
          <div class="hero-sub">۰</div>
        </div>
      </div>
      <div class="hero-main" id="hero-value">۰</div>
    </section>

    <section class="fav-section">
      <h2>⭐ میانبرها</h2>
      <div class="fav-grid" id="fav-grid"></div>
    </section>

    <nav class="cat-list" id="cat-list"></nav>
  </main>

  <!-- ===== Category / Tool list ===== -->
  <div id="view-list" class="view">
    <header class="subbar">
      <button class="icon-btn back-btn" data-back>‹</button>
      <h2 id="list-title"></h2>
      <span></span>
    </header>
    <div id="list-content" class="tool-list"></div>
  </div>

  <!-- ===== Tool detail ===== -->
  <div id="view-tool" class="view">
    <header class="subbar">
      <button class="icon-btn back-btn" data-back>‹</button>
      <h2 id="tool-title"></h2>
      <button class="icon-btn fav-toggle" id="tool-fav">☆</button>
    </header>
    <div id="tool-content" class="tool-content"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.js"></script>
<script src="js/jalali.js"></script>
<script src="js/tools.js"></script>
<script src="js/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
